name: Unity Android Build Pipeline

# Trigger conditions
on:
  push:
    branches:
      - main
  workflow_dispatch:  # Manual trigger

# Environment variables
env:
  UNITY_VERSION: 2022.1.10f1
  BUILD_NAME: unity2d-prototype
  BUILD_PATH: Builds/Android

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      
      # Step 2: Cache Library folder for faster builds
      - name: Cache Unity Library
        uses: actions/cache@v3
        with:
          path: unity2d-prototype/Library
          key: Library-Android-${{ hashFiles('unity2d-prototype/Assets/**', 'unity2d-prototype/Packages/**', 'unity2d-prototype/ProjectSettings/**') }}
          restore-keys: |
            Library-Android-
            Library-
      
      # Step 3: Setup Android Keystore
      - name: Setup Android Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > ${{ github.workspace }}/user.keystore
          echo "KEYSTORE_PATH=${{ github.workspace }}/user.keystore" >> $GITHUB_ENV
      
      # Step 4: Build APK
      - name: Build Android APK
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: unity2d-prototype
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: Android
          buildMethod: UnityBuilderAction.BuildScript.Build
          androidAppBundle: false
          androidKeystoreName: user.keystore
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEY_ALIAS }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEY_ALIAS_PASS }}
          buildName: ${{ env.BUILD_NAME }}
          buildsPath: ${{ env.BUILD_PATH }}
      
      # Step 5: Build AAB (Android App Bundle)
      - name: Build Android AAB
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: unity2d-prototype
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: Android
          buildMethod: UnityBuilderAction.BuildScript.Build
          androidAppBundle: true
          androidKeystoreName: user.keystore
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEY_ALIAS }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEY_ALIAS_PASS }}
          buildName: ${{ env.BUILD_NAME }}
          buildsPath: ${{ env.BUILD_PATH }}
      
      # Step 7: Upload APK as Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK-${{ github.sha }}
          path: ${{ env.BUILD_PATH }}/**/*.apk
          retention-days: 30
      
      # Step 8: Upload AAB as Artifact
      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-AAB-${{ github.sha }}
          path: ${{ env.BUILD_PATH }}/**/*.aab
          retention-days: 30
      
      # Step 9: Send Slack Notification
      - name: Send Slack Notification
        if: success()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ Android Build Successful",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n<${{ github.event.head_commit.url }}|${{ github.sha }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Build Artifacts:*\n• <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Download APK & AAB>"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Workflow: ${{ github.workflow }} | Run #${{ github.run_number }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
      
      # Step 10: Send Slack Notification on Failure
      - name: Send Slack Notification on Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ Android Build Failed",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Action Required:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Build Logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
      
      # Step 11: Cleanup
      - name: Cleanup Keystore
        if: always()
        run: |
          rm -f ${{ github.workspace }}/user.keystore
